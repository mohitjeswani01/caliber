# --- Methodology summary (optional, <=200 words; helps Stage-4 review) ------
methodology_summary: >
  Two-phase, substance-over-keywords. OFFLINE (scripts/precompute.py): parse the JD
  into an aspect-based requirement profile; encode all 100K candidates with a local
  bge-small-en-v1.5 bi-encoder over a description-heavy text representation; build a
  FAISS IndexFlatIP. ONLINE (rank.py, CPU-only, no network): per-aspect semantic
  retrieval + BM25 over role descriptions, fused (RRF) to an ~800 shortlist; a local
  cross-encoder sharpens the head; 9 structured features (role-substance with
  skill-gating, experience band, NLP/IR vs CV, product-vs-consulting, recency,
  tenure, external validation, location) combine via tuned hand-weights into a base
  score, modulated by a bounded behavioral multiplier from the 23 redrob_signals.
  Internally-inconsistent honeypots are forced to a score floor. The top 100 are
  selected deterministically (score desc, candidate_id asc), each with a grounded,
  template-generated reasoning string (no LLM at rank time). LTR is implemented but
  dormant — the hand-weight combiner is the submitted configuration.

# --- Reproduce (submission_spec §10.3: single command) ----------------------
reproduce:
  # One-time OFFLINE precompute (downloads + caches models, builds artifacts/).
  # Allowed to exceed the 5-min budget; only rank.py is time-bound.
  precompute_command: "CALIBER_ALLOW_MODEL_DOWNLOAD=1 python scripts/precompute.py --candidates ./data/candidates.jsonl"
  # The single command that produces the submission CSV from the artifacts.
  rank_command: "python rank.py --candidates ./data/candidates.jsonl --out ./submission.csv"
  validate_command: "python tests/validate_submission.py ./submission.csv"

# --- Models (downloaded offline, cached locally; zero network at rank time) --
models:
  embedding: "BAAI/bge-small-en-v1.5"            # 384-dim bi-encoder, cached under models/
  cross_encoder: "cross-encoder/ms-marco-MiniLM-L-6-v2"  # shortlist reranker
  ltr: "implemented but DORMANT (not used in this submission)"

# --- Key dependency versions (full list in requirements.txt / pyproject) -----
dependencies:
  python: "3.11.15"
  numpy: "1.26.4"
  faiss-cpu: "1.8.0"
  sentence-transformers: "2.7.0"
  lightgbm: "4.3.0"

# --- Artifacts rank.py consumes (built by precompute; gitignored) ------------
artifacts:
  - "artifacts/jd_profile.json"          # JD requirement profile
  - "artifacts/candidate_ids.npy"        # FAISS row -> candidate_id join key
  - "artifacts/faiss.index"              # IndexFlatIP over the 100K embeddings
  - "artifacts/candidate_emb.npy"        # embeddings (used offline to build the index)

# --- Timing (measured on the full 100K pool; budget = 300s) ------------------
timing:
  # OFFLINE precompute (one-time, no budget): ~10.7 min for 100K on a GPU; also
  # runnable on CPU (slower). Encodes all 100K + builds the FAISS index.
  precompute_seconds: 642        # ~10.7 min, 100K, GPU encode (offline; no budget)
  precompute_note: "~10.7 min for 100K on GPU; CPU-runnable (slower). Offline phase, no time limit."
  # ONLINE rank.py on the full 100,000-candidate pool, CPU-only, zero network.
  rank_seconds: 108.3            # total wall-clock; HARD budget = 300s
  rank_load_seconds: 38.2        # stream pool + load artifacts
  rank_score_seconds: 70.0       # score shortlist + cross-encoder rerank + select
  rank_budget_seconds: 300       # the hard constraint; we use ~36% of it

# --- Constraints honored at rank time (CLAUDE.md hard constraints) -----------
constraints_honored:
  runtime: "108.3s <= 300s (5-min budget)"
  memory: "<= 16 GB RAM"
  compute: "CPU-only (no GPU)"
  network: "ZERO network calls at rank time; HF_HUB_OFFLINE/TRANSFORMERS_OFFLINE locked before any model import (proven by tests/test_network_isolation.py)"
  model_download: "Only with CALIBER_ALLOW_MODEL_DOWNLOAD=1, used once during offline precompute; the online path fails closed without it"
  disk: "<= 5 GB intermediate state"

# --- Quality guardrails (asserted in rank.py / ranker.py before any CSV write)-
guardrails:
  honeypots_in_top_100: 0        # measured on the real submission; guardrail trips at > 10%
  tests_passing: 189
  self_validation: "rank.py self-validates the written CSV with tests/validate_submission.py; non-zero exit on any issue"

# --- Scoring configuration (the shipped weights) -----------------------------
scoring:
  combiner: "tuned hand-weights (LTR built but DORMANT)"
  cross_encoder_weight: 0.10     # tuned down from 0.25; mass shifted to substance features
  semantic_weight: 0.10
  role_substance_weight: 0.23    # dominant structured driver (STRATEGY.md §4.1)
  shortlist_size: 800            # post-fusion candidates scored in detail
  cross_encoder_shortlist_size: 200  # head reranked by the cross-encoder
  behavioral_multiplier_envelope: "0.50x .. 1.15x (bounded, asymmetric)"
  honeypot_floor: -1.0
  tuning: "selected on TRAIN composite, validated on a held-out half across 5 seeds (1/7/42/123/2024); beat the prior ce=0.25 weights 5/5 on validation composite + NDCG@10"
  seed: 42
  reference_date: "2026-06-16"
